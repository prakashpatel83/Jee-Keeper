<!DOCTYPE html>
<html>
<head>  <title>JEE Syllabus Tracker</title>
<meta name="description" content="Track your JEE syllabus progress chapter-wise.">
<meta name="keywords" content="JEE, syllabus tracker, IIT JEE, study planner">

    
    <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4CAF50">
    
    <title>JEE Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    
    <h1 style="text-align:center;">JEE Syllabus Tracker</h1>

<p class="credit">
    Built by
    <span class="name">Prakash Patel</span>
</p>

    <div class="card">
        <h2>Progress</h2>

        <div class="progress-bar">
            <div class="progress-fill" id="progress"></div>
        </div>

        <p id="percent">0%</p>
    </div>

    <div class="card">

        <h2>⚛️Physics</h2>


        <div class="chapter">
            <span>Motion In One Dimension</span>

            <input type="checkbox"
                   onchange="updateProgress()">
        </div>

        <div class="chapter">
            <span>Motion In Two Dimensions</span>

            <input type="checkbox"
                   onchange="updateProgress()">
        </div>

        <div class="chapter">
            <span>Laws Of Motion</span>

            <input type="checkbox"
                   onchange="updateProgress()">
        </div>
        <div class="card">
    <h2>🧪Chemistry</h2>
</div>

<div class="chapter">
    <span>Mole Concept</span>
    <input type="checkbox">
</div>

<div class="chapter">
    <span>Redox</span>
    <input type="checkbox">
</div>

<div class="chapter">
    <span>Laws Of Motion</span>
    <input type="checkbox">
</div>

<div class="chapter">
    <span>Work Power Energy</span>
    <input type="checkbox">
</div>

<div class="chapter">
    <span>Rotational Motion</span>
    <input type="checkbox">
</div>

<div class="chapter">
    <span>Gravitation</span>
    <input type="checkbox">
</div>

<div class="card">
    <h2>📐Mathematics</h2>
</div>

    </div>
    
    <p class="quote">🚀 Every chapter completed brings you closer to IIT!</p>

</div>


    

<script src="app.js"></script>

</body>
</html>
