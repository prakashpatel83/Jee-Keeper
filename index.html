<!DOCTYPE html>
<html>
<head>
  <title>UprepJEE</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div>
    <h1 class="head">UprepJEE</h1>

 <p class="credit">
    Created  by <span class="name">Prakash Patel</span>
  </p>


  </div>



<div class="container">

    <!-- Blog Card -->
    <div class="card blog" onclick="window.location.href='/Tracker/test.html'">

        <div class="left">

            <div class="icon-box">
                <i class="fa-solid fa-desktop"></i>
            </div>

            <h2 class="title">Tracker</h2>

        </div>

        <div class="arrow">
            <i class="fa-solid fa-angle-right"></i>
        </div>

    </div>

    <!-- PDF Bank Card -->
    <div class="card pdf"  onclick="window.location.href='/books/books.html'">

        <div class="left">

            <div class="icon-box">
                <i class="fa-solid fa-file-pdf"></i>
            </div>

            <h2 class="title">Jee Books</h2>

        </div>

        <div class="arrow">
            <i class="fa-solid fa-angle-right"></i>
        </div>

    </div>

    <!-- Test Series Card -->
    <div class="card test">

        <div class="left">

            <div class="icon-box">
                <i class="fa-solid fa-clipboard-list"></i>
            </div>

            <h2 class="title">Test Series</h2>

        </div>

        <div class="arrow">
            <i class="fa-solid fa-angle-right"></i>
        </div>

    </div>

    <!-- Books Card -->
    <div class="card books">

        <div class="left">

            <div class="icon-box">
                <i class="fa-solid fa-book"></i>
            </div>

            <h2 class="title">Books</h2>

        </div>

        <div class="arrow">
            <i class="fa-solid fa-angle-right"></i>
        </div>

    </div>

</div>








<script src="script.js"></script>
</body>
</html>
